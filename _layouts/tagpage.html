---
layout: default
---
<div class="post tag-page">
  <h1>tag: {{ page.tag }}</h1>

  <ul class="post-list">
    {% for post in site.tags[page.tag] %}
      <li>
        <a href="{{ post.url }}">{{ post.title }}</a>
        <span class="post-date">{{ post.date | date: "%Y-%m-%d" }}</span>
      </li>
    {% endfor %}
  </ul>
</div>
