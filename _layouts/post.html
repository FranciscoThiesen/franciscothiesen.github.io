---
layout: default
---
<span class="post-tags">
  {% for tag in page.tags %}
    {% capture tag_name %}{{ tag }}{% endcapture %}
    <a href="/tag/{{ tag_name | replace: ' ', '_' }}"><code><nobr>{{ tag_name }}</nobr></code></a>
  {% endfor %}
</span>

<article class="post">
  <h1>{{ page.title }}</h1>

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">{{ page.date | date: "%Y-%m-%d" }}</div>

  {% include disqus.html %}
</article>
