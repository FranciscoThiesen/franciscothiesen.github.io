<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <link rel="preconnect" href="https://avatars.githubusercontent.com" crossorigin>
    {% if page.usemathjax %}<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>{% endif %}

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />

    <script>
      // Apply stored theme before first paint to avoid light-flash on dark default.
      (function() {
        try {
          if (localStorage.getItem('theme-preference') === 'light') {
            document.documentElement.classList.add('light-mode');
          }
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead">
          <div class="prompt-bar" aria-hidden="true"><span class="path">~/chico.dev</span><span class="sigil">$</span><span class="cmd">whoami</span><span class="cursor"></span></div>

          <div class="identity">
            <a href="{{ site.baseurl }}/" class="site-avatar"><img src="{{ site.avatar }}" width="60" height="60" alt="{{ site.name }}" /></a>
            <div class="site-info">
              <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
              <p class="site-description">{{ site.description }}</p>
            </div>
          </div>

          <nav class="site-nav">
            <a href="{{ site.baseurl }}/">[blog]</a>
            <a href="{{ site.baseurl }}/about">[about]</a>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle theme">[~]</button>
          </nav>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
        </footer>
      </div>
    </div>

    {% if page.usemathjax %}
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    {% endif %}
    {% include analytics.html %}

    <script>
      (function() {
        // Lazy-load all images inside post content (below the fold).
        document.querySelectorAll('#main img').forEach(function(img) { img.loading = 'lazy'; });

        var toggle = document.getElementById('theme-toggle');
        if (!toggle) return;
        var html = document.documentElement;
        var KEY = 'theme-preference';

        toggle.addEventListener('click', function() {
          var isLight = html.classList.toggle('light-mode');
          try { localStorage.setItem(KEY, isLight ? 'light' : 'dark'); } catch (e) {}
        });
      })();
    </script>
  </body>
</html>
